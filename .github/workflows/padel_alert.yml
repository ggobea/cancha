name: Padel alert

on:
  schedule:
    - cron: "17 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      ATC_PLACE_ID: 69y6bfcuh
      ATC_LOCATION_NAME: Ituzaingó, Provincia de Buenos Aires, Argentina
      ATC_SPORT_ID: 7
      ATC_TARGET_TIMES: 18:00,18:30,19:00,19:30
      STATE_PATH: .github/padel_state.json
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run checker
        run: python padel_alert.py --once

      - name: Commit updated state
        run: |
          if git diff --quiet .github/padel_state.json; then
            echo "No changes in state file"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/padel_state.json
          git commit -m "Update padel state"
          git push
